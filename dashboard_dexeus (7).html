// ── Formato de números ──────────────────────────────────────────
const n   = v => Math.round(v).toLocaleString('es-ES');
const eur = (v, dec=2) => '€\u202f' + parseFloat(v).toLocaleString('es-ES', {minimumFractionDigits:dec, maximumFractionDigits:dec});
const pct = v => parseFloat(v).toLocaleString('es-ES', {minimumFractionDigits:1, maximumFractionDigits:1}) + '%';
function mom(arr, i) {
  if (i === 0) return null;
  return arr[i-1] ? ((arr[i]-arr[i-1])/arr[i-1]*100).toFixed(1) : null;
}
function fmtMom(v) {
  if (v === null) return '<span class="neu">—</span>';
  const x = parseFloat(v);
  if (x > 0) return `<span class="pos">+${v}%</span>`;
  if (x < 0) return `<span class="neg">${v}%</span>`;
  return '<span class="neu">0%</span>';
}
function convP(leads, vis) {
  return leads.map((l,i) => l ? parseFloat(((vis[i]/l)*100).toFixed(1)) : 0);
}

// ── Parseo CSV ──────────────────────────────────────────────────
// Columnas: Mes|Canal|Leads|Llamadas|WhatsApp|PBI_Leads|Visitas|%Conv|Inversion|CPL
function parseCSV(text) {
  // Parser de CSV que respeta campos entre comillas
  function parseLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += c; }
    }
    result.push(cur);
    return result;
  }

  // Limpia un valor numérico español: "2.232,33€" → 2232.33
  function cleanNum(v) {
    if (!v) return 0;
    const s = v.toString().replace(/"/g,'').replace(/€/g,'').replace(/%/g,'').trim();
    // Formato español: punto=miles, coma=decimal → quitar puntos, coma→punto
    const cleaned = s.replace(/\./g,'').replace(',','.');
    return parseFloat(cleaned) || 0;
  }

  const lines = text.trim().split('\n');
  const byMonth = {};
  const monthOrder = [];

  lines.slice(1).forEach(line => {
    if (!line.trim()) return;
    const cols = parseLine(line);
    if (cols.length < 9) return;
    const mes      = cols[0].trim().replace(/"/g,'');
    const canal    = cols[1].trim().replace(/"/g,'');
    const leads    = cleanNum(cols[2]);
    const llamadas = cleanNum(cols[3]);
    const wa       = cleanNum(cols[4]);
    const pbi      = cleanNum(cols[5]);
    const visitas  = cleanNum(cols[6]);
    // cols[7] = % Conversión — se ignora, se calcula en el dashboard
    const inv      = cleanNum(cols[8]);
    const cpl      = cleanNum(cols[9]);

    if (!mes || !canal) return;
    if (!byMonth[mes]) { byMonth[mes] = {}; monthOrder.push(mes); }
    let key;
    if (canal.toLowerCase().includes('google')) key = 'google';
    else if (canal.toLowerCase().includes('organic') || canal.toLowerCase().includes('orgánic')) key = 'organico';
    else key = 'meta';
    byMonth[mes][key] = { leads, llamadas, wa, pbi, visitas, inv, cpl };
  });

  const mesLabel = m => {
    const parts = m.split('-');
    if (parts.length < 2) return m;
    const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return (names[parseInt(parts[1])-1] || parts[1]) + ' ' + String(parts[0]).slice(2);
  };

  const months = [];
  const meta     = { leads:[], llamadas:[], wa:[], pbi:[], visitas:[], inv:[], cpl:[] };
  const google   = { leads:[], llamadas:[], wa:[], pbi:[], visitas:[], inv:[], cpl:[] };
  const organico = { leads:[], llamadas:[], wa:[], pbi:[], visitas:[], inv:[], cpl:[] };

  monthOrder.forEach(mes => {
    const row = byMonth[mes];
    months.push(mesLabel(mes));
    ['leads','llamadas','wa','pbi','visitas','inv','cpl'].forEach(k => {
      meta[k].push(row.meta   ? row.meta[k]   : 0);
      google[k].push(row.google ? row.google[k] : 0);
      organico[k].push(row.organico ? row.organico[k] : 0);
    });
  });

  return { months, meta, google, organico };
}

// ── Carga de datos ──────────────────────────────────────────────
async function loadData(line) {
  if (DB[line]) return true;
  const url = SHEET_URLS[line];
  if (!url || url.startsWith('PEGA_')) {
    DB[line] = getDemoData(line);
    return true;
  }
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (!text || text.trim().length === 0) throw new Error('CSV vacío');
    const parsed = parseCSV(text);
    if (!parsed.months || parsed.months.length === 0) throw new Error('Sin filas');
    DB[line] = parsed;
    return true;
  } catch(e) {
    console.warn('Error cargando Sheet, usando datos de demo:', e.message);
    DB[line] = getDemoData(line);
    // Aviso visual no bloqueante
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#FFF8E1;border:0.5px solid #F0C040;border-radius:8px;padding:10px 14px;margin:0 20px 12px;font-size:12px;color:#7A5800';
    banner.innerHTML = '⚠️ No se han podido cargar los datos del Sheet. Mostrando datos de demo. Comprueba que el Sheet está publicado como CSV.';
    const content = document.getElementById('main-content');
    if (content) content.insertAdjacentElement('afterbegin', banner);
    return true;
  }
}

// ── Tabs de mes ──────────────────────────────────────────────────
function buildMonthTabs() {
  const d = DB[curLine];
  if (!d) return;
  document.getElementById('month-tabs').innerHTML = d.months.map((m,i) => {
    const isLast = i === d.months.length - 1;
    const activeCls = i === curMIdx ? (isLast ? 'active-dark' : (curLine==='fertilidad' ? 'active-blue' : 'active-pink')) : '';
    return `<button class="mt ${activeCls}" onclick="switchMonth(${i},this)">${m}</button>`;
  }).join('');
}

function switchMonth(i, el) {
  curMIdx = i;
  document.querySelectorAll('#month-tabs .mt').forEach(t => t.classList.remove('active-blue','active-pink','active-dark'));
  el.classList.add(i === DB[curLine].months.length-1 ? 'active-dark' : (curLine==='fertilidad'?'active-blue':'active-pink'));
  render();
}

async function switchLine(key, el) {
  curLine = key;
  document.querySelectorAll('.lt').forEach(t => t.classList.remove('active-fert','active-don'));
  el.classList.add(key==='fertilidad' ? 'active-fert' : 'active-don');
  document.getElementById('main-content').innerHTML = '<div class="loading">Cargando datos...</div>';
  await loadData(key);
  curMIdx = DB[key].months.length - 1;
  buildMonthTabs();
  buildContent();
  render();
}

// ── Gráficas ─────────────────────────────────────────────────────
function barChart(id, labels, ds, ytickFn) {
  const el = document.getElementById(id); if (!el) return;
  if (CH[id]) CH[id].destroy();
  CH[id] = new Chart(el, { type:'bar', data:{labels, datasets:ds}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:10},autoSkip:false,maxRotation:0}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:10},callback:ytickFn||(v=>v)}}}}});
}
function lineChart(id, labels, ds, ytickFn) {
  const el = document.getElementById(id); if (!el) return;
  if (CH[id]) CH[id].destroy();
  CH[id] = new Chart(el, { type:'line', data:{labels, datasets:ds}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:10},autoSkip:false,maxRotation:0}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:10},callback:ytickFn||(v=>v)}}}}});
}
function setLegend(id, items) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = items.map(([color, label, dashed]) =>
    `<span><span class="ld" style="background:${color}${dashed?';outline:1px dashed '+color:''}"></span>${label}</span>`
  ).join('');
}

// ── Render principal ─────────────────────────────────────────────
function render() {
  const d = DB[curLine];
  const t = THEME[curLine];
  const i = curMIdx;
  if (!d) return;

  const label = curLine === 'fertilidad' ? 'Fertilidad' : 'Donación';
  const setT = (id, txt) => { const el=document.getElementById(id); if(el) el.textContent=txt; };
  setT('sec-title-kpi', label+' · '+d.months[i]);
  setT('sec-title-tbl', 'Detalle por canal · '+d.months[i]);
  setT('sec-title-evol', 'Evolución mensual · '+label);

  const totLeads = d.meta.leads[i] + d.google.leads[i];
  const totVis   = d.meta.visitas[i] + d.google.visitas[i];
  const totInv   = d.meta.inv[i] + d.google.inv[i];
  const totCpl   = totLeads ? totInv/totLeads : 0;
  const totConv  = totLeads ? (totVis/totLeads)*100 : 0;
  const allLeads = d.months.map((_,j) => d.meta.leads[j]+d.google.leads[j]);
  const allInv   = d.months.map((_,j) => d.meta.inv[j]+d.google.inv[j]);
  const allVis   = d.months.map((_,j) => d.meta.visitas[j]+d.google.visitas[j]);

  // KPIs
  const totLeadsReal = d.meta.pbi[i] + d.google.pbi[i] + d.organico.pbi[i];
  const allLeadsReal = d.months.map((_,j)=>d.meta.pbi[j]+d.google.pbi[j]+d.organico.pbi[j]);
  const kpiEl = document.getElementById('kpi-grid'); if (!kpiEl) return;
  kpiEl.innerHTML = [
    {label:'Leads totales (Power BI)', val:n(totLeadsReal), tag:'MOM', momVal:mom(allLeadsReal,i), bg:`background:${t.navyBg}`, lc:'color:rgba(255,255,255,.6)', vc:'color:#fff', dtag:'background:rgba(255,255,255,.18);color:rgba(255,255,255,.8)'},
    {label:'Leads paid media',       val:n(totLeads),     tag:'MOM', momVal:mom(allLeads,i), bg:'', lc:'', vc:'', dtag:''},
    {label:'1ª visita conseguidas',  val:n(totVis),       tag:'MOM', momVal:mom(allVis,i),  bg:'', lc:'', vc:'', dtag:''},
    {label:'Conv. lead → visita',    val:pct(totConv.toFixed(1)), tag:'', momVal:null, bg:'', lc:'', vc:'', dtag:''},
  ].map(k => `<div class="kpi" style="${k.bg}">
    <div class="kpi-label" style="${k.lc}">${k.label}</div>
    <div class="kpi-val" style="${k.vc}">${k.val}</div>
    ${k.tag ? `<div class="kpi-deltas"><div class="delta-row"><span class="delta-tag" style="${k.dtag}">${k.tag}</span>${fmtMom(k.momVal)}</div></div>` : ''}
  </div>`).join('');

  // Tabla
  const tblEl = document.getElementById('canal-table'); if (!tblEl) return;
  tblEl.innerHTML = `<thead><tr><th>Canal</th><th>Leads</th><th>Δ MOM</th><th>Visitas</th><th>Conv %</th><th>Inversión</th><th>CPL</th><th>Δ MOM CPL</th></tr></thead><tbody>
    <tr><td><span class="canal-badge"><span class="dot" style="background:${t.c1}"></span>${t.label1}</span></td>
      <td>${n(d.meta.leads[i])}</td><td>${fmtMom(mom(d.meta.leads,i))}</td>
      <td>${n(d.meta.visitas[i])}</td>
      <td>${d.meta.leads[i] ? pct(((d.meta.visitas[i]/d.meta.leads[i])*100).toFixed(1)) : '—'}</td>
      <td>${eur(d.meta.inv[i],0)}</td><td>${eur(d.meta.cpl[i])}</td><td>${fmtMom(mom(d.meta.cpl,i))}</td></tr>
    <tr><td><span class="canal-badge"><span class="dot" style="background:${t.c2}"></span>${t.label2}</span></td>
      <td>${n(d.google.leads[i])}</td><td>${fmtMom(mom(d.google.leads,i))}</td>
      <td>${n(d.google.visitas[i])}</td>
      <td>${d.google.leads[i] ? pct(((d.google.visitas[i]/d.google.leads[i])*100).toFixed(1)) : '—'}</td>
      <td>${eur(d.google.inv[i],0)}</td><td>${eur(d.google.cpl[i])}</td><td>${fmtMom(mom(d.google.cpl,i))}</td></tr>
    <tr class="total-row"><td>Total</td><td>${n(totLeads)}</td><td>—</td><td>${n(totVis)}</td>
      <td>${pct(totConv.toFixed(1))}</td><td>${eur(totInv,0)}</td><td>${eur(totCpl)}</td><td>—</td></tr>
  </tbody>`;

  // Canal Orgánico
  const orgLeads = d.organico.pbi[i];
  const orgVis   = d.organico.visitas[i];
  const orgConv  = orgLeads ? (orgVis/orgLeads)*100 : 0;
  const allOrgLeads = d.months.map((_,j)=>d.organico.pbi[j]);
  const orgEl = document.getElementById('organico-grid');
  if (orgEl) {
    orgEl.innerHTML = [
      {label:'Leads orgánico', val:n(orgLeads), tag:'MOM', momVal:mom(allOrgLeads,i)},
      {label:'Visitas conseguidas', val:n(orgVis), tag:'', momVal:null},
      {label:'Conv. lead → visita', val: orgLeads ? pct(orgConv.toFixed(1)) : '—', tag:'', momVal:null},
    ].map(k=>`<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-val">${k.val}</div>${k.tag?`<div class="kpi-deltas"><div class="delta-row"><span class="delta-tag">${k.tag}</span>${fmtMom(k.momVal)}</div></div>`:''}</div>`).join('');
  }

  // Conversión — formulario = leads - llamadas - whatsapp
  const mForms = Math.max(0, d.meta.leads[i] - (d.meta.llamadas[i]||0) - (d.meta.wa[i]||0));
  const gForms = Math.max(0, d.google.leads[i] - (d.google.llamadas[i]||0) - (d.google.wa[i]||0));
  const totF = mForms + gForms;
  const totC = (d.meta.llamadas[i]||0) + (d.google.llamadas[i]||0);
  const totW = (d.meta.wa[i]||0) + (d.google.wa[i]||0);
  const totAll = totF + totC + totW || 1;
  const convEl = document.getElementById('conv-grid'); if (!convEl) return;
  convEl.innerHTML = [
    {icon:'📝', label:'Formulario web', val:totF, p:Math.round((totF/totAll)*100)},
    {icon:'📞', label:'Llamada',        val:totC, p:Math.round((totC/totAll)*100)},
    {icon:'💬', label:'WhatsApp',       val:totW, p:Math.round((totW/totAll)*100)},
  ].map(c => `<div class="conv-card">
    <div class="conv-icon-wrap" style="background:${t.iconBg}"><span class="conv-icon">${c.icon}</span></div>
    <div class="conv-label">${c.label}</div>
    <div class="conv-val">${n(c.val)}</div>
    <div class="conv-bar-wrap"><div class="conv-bar" style="width:${c.p}%;background:${t.ac1}"></div></div>
    <div class="conv-pct">${c.p}% del total</div>
  </div>`).join('');

  // Leyendas
  setLegend('leg-leads', [[t.c1,t.label1],[t.c2,t.label2],['#999999','Orgánico']]);
  setLegend('leg-inv',   [[t.c1,t.label1],[t.c2,t.label2]]);
  setLegend('leg-cpl',   [[t.c1,t.label1,true],[t.c2,t.label2,true]]);
  setLegend('leg-conv',  [[t.c1,t.label1],[t.c2,t.label2,true],['#888888','Orgánico',true]]);
  setLegend('leg-meta',  [[t.c1,'Plataforma'],[t.c1dark,'Power BI',true]]);
  setLegend('leg-google',[[t.c2,'Plataforma'],[t.c2dark,'Power BI',true]]);
  const cbM = document.getElementById('cb-meta');   if(cbM)   cbM.innerHTML   = `<span class="dot" style="background:${t.c1}"></span>${t.label1}`;
  const cbG = document.getElementById('cb-google'); if(cbG)   cbG.innerHTML   = `<span class="dot" style="background:${t.c2}"></span>${t.label2}`;

  // Gráficas evolución
  barChart('c-leads', d.months, [
    {label:t.label1, data:d.meta.leads,                   backgroundColor:t.c1+'BB', borderColor:t.c1, borderWidth:1},
    {label:t.label2, data:d.google.leads,                 backgroundColor:t.c2+'BB', borderColor:t.c2, borderWidth:1},
    {label:'Orgánico', data:d.organico.pbi,               backgroundColor:'#999999BB', borderColor:'#999999', borderWidth:1}
  ]);
  barChart('c-inv', d.months, [
    {label:t.label1, data:d.meta.inv.map(v=>Math.round(v)),   backgroundColor:t.c1+'BB', borderColor:t.c1, borderWidth:1},
    {label:t.label2, data:d.google.inv.map(v=>Math.round(v)), backgroundColor:t.c2+'BB', borderColor:t.c2, borderWidth:1}
  ], v => '€ '+Number(v).toLocaleString('es-ES'));
  lineChart('c-cpl', d.months, [
    {label:t.label1, data:d.meta.cpl,   borderColor:t.c1, pointBackgroundColor:t.c1, tension:.3, fill:false, borderWidth:2, pointRadius:4},
    {label:t.label2, data:d.google.cpl, borderColor:t.c2, pointBackgroundColor:t.c2, tension:.3, fill:false, borderWidth:2, pointRadius:4, borderDash:[4,3]}
  ], v => '€ '+v);
  lineChart('c-conv', d.months, [
    {label:t.label1, data:convP(d.meta.leads,d.meta.visitas),     borderColor:t.c1, pointBackgroundColor:t.c1, tension:.3, fill:false, borderWidth:2, pointRadius:4},
    {label:t.label2, data:convP(d.google.leads,d.google.visitas), borderColor:t.c2, pointBackgroundColor:t.c2, tension:.3, fill:false, borderWidth:2, pointRadius:4, borderDash:[4,3]},
    {label:'Orgánico', data:convP(d.organico.pbi,d.organico.visitas), borderColor:'#888888', pointBackgroundColor:'#888888', tension:.3, fill:false, borderWidth:2, pointRadius:4, borderDash:[2,2]}
  ], v => v+'%');

  // Power BI
  lineChart('chart-meta', d.months, [
    {label:'Plataforma', data:d.meta.leads, borderColor:t.c1, pointBackgroundColor:t.c1, tension:.3, fill:false, borderWidth:2, pointRadius:4},
    {label:'Power BI',   data:d.meta.pbi,   borderColor:t.c1dark, pointBackgroundColor:t.c1dark, tension:.3, fill:false, borderWidth:2, pointRadius:4, borderDash:[4,3]}
  ]);
  lineChart('chart-google', d.months, [
    {label:'Plataforma', data:d.google.leads, borderColor:t.c2, pointBackgroundColor:t.c2, tension:.3, fill:false, borderWidth:2, pointRadius:4},
    {label:'Power BI',   data:d.google.pbi,   borderColor:t.c2dark, pointBackgroundColor:t.c2dark, tension:.3, fill:false, borderWidth:2, pointRadius:4, borderDash:[4,3]}
  ]);

  const dM = d.meta.leads[i] - d.meta.pbi[i];
  const dG = d.google.leads[i] - d.google.pbi[i];
  const pM = d.meta.leads[i]   ? Math.round((dM/d.meta.leads[i])*100)   : 0;
  const pG = d.google.leads[i] ? Math.round((dG/d.google.leads[i])*100) : 0;
  const diffEl = document.getElementById('diff-summary');
  if (diffEl) diffEl.innerHTML = `Diferencia ${d.months[i]} — ${t.label1}: <strong>${dM>0?'+':''}${dM}</strong> leads (${pM}%) · ${t.label2}: <strong>${dG>0?'+':''}${dG}</strong> leads (${pG}%)`;
}

// ── Arranque ─────────────────────────────────────────────────────
(async () => {
  await loadData('fertilidad');
  curMIdx = DB.fertilidad.months.length - 1;
  buildMonthTabs();
  buildContent();
  render();
})();
</script>
</body>
</html>
